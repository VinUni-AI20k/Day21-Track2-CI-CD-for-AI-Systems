name: MLOps Pipeline

on:
  push:
    branches: [clean-main]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
      - '.github/workflows/mlops.yml'
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 - UNIT TEST
  # Chay unit tests tren du lieu ao (khong can ket noi cloud storage).
  # Neu co bat ky test nao that bai, pipeline dung lai o day va khong tien hanh
  # huan luyen hay trien khai.
  # ---------------------------------------------------------------------------
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v


  # ---------------------------------------------------------------------------
  # JOB 2 - TRAIN
  # Xac thuc AWS S3, pull du lieu bang DVC, huan luyen mo hinh, upload artifact.
  # Chi chay khi Job 1 (Unit Test) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}
      model_type: ${{ steps.read_metrics.outputs.model_type }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to AWS
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY" >> $GITHUB_ENV

      - name: Configure AWS credentials for DVC
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc data/train_phase2.csv.dvc

      - name: Train model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          MT=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d.get('model_type','random_forest'))")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT
          echo "model_type=$MT" >> $GITHUB_OUTPUT

      - name: Upload model to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: |
          python - <<'EOF'
          import boto3
          import os

          bucket = os.environ["BUCKET"]
          s3 = boto3.client("s3")

          # Upload model.pkl
          s3.upload_file(
              "models/model.pkl",
              bucket,
              "models/latest/model.pkl",
              ExtraArgs={"ContentType": "application/octet-stream"}
          )
          print(f"Uploaded models/model.pkl to s3://{bucket}/models/latest/model.pkl")

          # Upload performance report (Bonus 3)
          if os.path.exists("outputs/report.txt"):
              s3.upload_file(
                  "outputs/report.txt",
                  bucket,
                  "models/latest/report.txt",
                  ExtraArgs={"ContentType": "text/plain"}
              )
              print(f"Uploaded report to s3://{bucket}/models/latest/report.txt")
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: |
            outputs/metrics.json
            outputs/report.txt

      - name: Upload metrics.json to S3 for eval
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: |
          aws s3 cp outputs/metrics.json s3://$AWS_S3_BUCKET/models/latest/metrics.json

      - name: Download previous metrics for rollback check (Bonus 4)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: |
          python - <<'EOF'
          import boto3
          import os
          import json

          bucket = os.environ["BUCKET"]
          s3 = boto3.client("s3")
          prev_metrics_path = "outputs/previous_metrics.json"

          try:
              s3.download_file(bucket, "models/latest/metrics.json", prev_metrics_path)
              print("Previous metrics found, will compare for rollback (Bonus 4)")
          except Exception:
              print("No previous metrics found on S3, skipping rollback check")
              # Create an empty file so the step doesn't fail
              os.makedirs("outputs", exist_ok=True)
              with open(prev_metrics_path, "w") as f:
                  json.dump({"accuracy": 0.0}, f)
          EOF


  # ---------------------------------------------------------------------------
  # JOB 3 - EVAL
  # Kiem tra nguong chat luong (accuracy >= 0.70) va rollback (Bonus 4).
  # Pipeline dung lai o day neu mo hinh chua dat yeu cau.
  # Chi chay khi Job 2 (Train) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Download previous metrics for rollback check
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: |
          aws s3 cp s3://$AWS_S3_BUCKET/models/latest/metrics.json /tmp/prev_metrics.json 2>/dev/null && \
            echo "Previous metrics found for rollback check (Bonus 4)" || \
            echo "No previous metrics on S3 — first run"

      - name: Check eval gate - download metrics from S3 and evaluate
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: |
          aws s3 cp s3://$AWS_S3_BUCKET/models/latest/metrics.json /tmp/metrics.json
          python3 - <<'PYEOF'
          import json
          with open("/tmp/metrics.json") as f:
              metrics = json.load(f)
          acc = float(metrics["accuracy"])
          mt = metrics.get("model_type", "unknown")
          label_dist = metrics.get("label_distribution", {})
          print(f"Current model accuracy : {acc:.4f}")
          print(f"Model type             : {mt}")

          # Bonus 5: Data distribution warning
          for label, info in label_dist.items():
              ratio = info["ratio"]
              if ratio < 0.10:
                  print(f"WARNING: Class {label} has only {ratio:.1%} of samples (< 10%)")

          # Bonus 4: Rollback check
          try:
              with open("/tmp/prev_metrics.json") as f:
                  prev = json.load(f)
              prev_acc = float(prev.get("accuracy", 0.0))
              if prev_acc > 0.0:
                  print(f"\nPrevious model accuracy : {prev_acc:.4f}")
                  if acc < prev_acc:
                      print(f"WARNING: New accuracy {acc:.4f} < Previous {prev_acc:.4f}")
                      print("Continuing deploy (above threshold, but model is worse)")
                  else:
                      print(f"OK: New model is better (+{acc - prev_acc:.4f})")
          except:
              pass

          # Eval gate
          if acc < 0.70:
              print(f"\nFAILED: accuracy {acc:.4f} < 0.70 — deploy blocked.")
              raise SystemExit(1)
          print(f"PASSED: accuracy {acc:.4f} >= 0.70")
          print("\nEVAL GATE PASSED — proceeding to deploy")
          PYEOF


  # ---------------------------------------------------------------------------
  # JOB 4 - DEPLOY
  # Trien khai len VM qua SSH.
  # Chi chay khi Job 3 (Eval) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - name: Restart mlops-serve on VM
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          echo "$VM_SSH_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i /tmp/deploy_key "$VM_USER@$VM_HOST" \
            "sudo systemctl restart mlops-serve && sleep 10 && curl -sf http://localhost:8000/health && echo 'Health check passed.'" || \
            { echo "Deploy failed. Showing service logs:"; ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key "$VM_USER@$VM_HOST" "sudo journalctl -u mlops-serve -n 20 --no-pager" || true; exit 1; }
