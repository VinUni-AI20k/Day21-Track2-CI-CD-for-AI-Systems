name: MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 - UNIT TEST
  # Chay unit tests tren du lieu ao (khong can ket noi cloud storage).
  # Neu co bat ky test nao that bai, pipeline dung lai o day va khong tien hanh
  # huan luyen hay trien khai.
  # ---------------------------------------------------------------------------
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v


  # ---------------------------------------------------------------------------
  # JOB 2 - TRAIN
  # Xac thuc cloud storage, pull du lieu bang DVC, huan luyen mo hinh, upload artifact.
  # Chi chay khi Job 1 (Unit Test) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to AWS
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=${{ secrets.AWS_REGION }}" >> $GITHUB_ENV

      - name: Pull data with DVC
        run: dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT

      - name: Upload model to S3
        run: |
          python - <<'EOF'
          import os
          import boto3
          s3 = boto3.client('s3')
          bucket = os.environ["CLOUD_BUCKET"]
          s3.upload_file("models/model.pkl", bucket, "models/latest/model.pkl")
          print("Model uploaded successfully to S3.")
          EOF
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json

      - name: Bonus 3 Upload performance report
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: outputs/report.txt


  # ---------------------------------------------------------------------------
  # JOB 3 - EVAL
  # Kiem tra nguong chat luong (accuracy >= 0.70).
  # Pipeline dung lai o day neu mo hinh chua dat yeu cau.
  # Chi chay khi Job 2 (Train) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:

      - name: Check eval gate
        run: |
          python - <<'EOF'
          acc = float("${{ needs.train.outputs.accuracy }}")
          if acc < 0.70:
              raise SystemExit(f"FAILED: accuracy {acc:.4f} < 0.70. Huy deploy.")
          print(f"PASSED: accuracy {acc:.4f} >= 0.70. Dang trien khai model.")
          EOF


  # ---------------------------------------------------------------------------
  # JOB 4 - ROLLBACK CHECK (Bonus 4)
  # Kiem tra xem model moi co tot hon model cu khong.
  # Chi deploy khi accuracy moi >= accuracy cu.
  # Chi chay khi Job 3 (Eval) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  rollback_check:
    name: Rollback Check
    needs: [train, eval]
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.compare_accuracy.outputs.should_deploy }}
    steps:

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install boto3
        run: pip install boto3

      - name: Bonus 4: Compare with previous model
        id: compare_accuracy
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
        run: |
          python - <<'EOF'
          import os
          import json
          import boto3

          new_acc = float("${{ needs.train.outputs.accuracy }}")
          bucket = os.environ["CLOUD_BUCKET"]
          s3 = boto3.client('s3')

          # Thu tai metrics.json cu tu S3
          old_acc = None
          try:
              s3.download_file(bucket, "metrics/metrics.json", "/tmp/old_metrics.json")
              with open("/tmp/old_metrics.json") as f:
                  old_data = json.load(f)
              old_acc = old_data["accuracy"]
              print(f"Accuracy cu: {old_acc:.4f}")
          except Exception as e:
              print(f"Khong tim thay metrics cu (dau tien deploy): {e}")
              old_acc = None

          print(f"Accuracy moi: {new_acc:.4f}")

          # So sanh
          if old_acc is None:
              should_deploy = "true"
              print(">>> Dau tien deploy, cho phep deploy.")
          elif new_acc >= old_acc:
              should_deploy = "true"
              print(f">>> PASS: Accuracy moi ({new_acc:.4f}) >= Accuracy cu ({old_acc:.4f}). Cho phep deploy.")
          else:
              should_deploy = "false"
              print(f">>> FAIL: Accuracy moi ({new_acc:.4f}) < Accuracy cu ({old_acc:.4f}). HUY DEPLOY de rollback.")

          # Ghi output
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"should_deploy={should_deploy}\n")
          EOF


  # ---------------------------------------------------------------------------
  # JOB 5 - DEPLOY
  # Trien khai len VM qua SSH.
  # Chi chay khi Job 4 (Rollback Check) hoan thanh thanh cong va cho phep deploy.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: rollback_check
    runs-on: ubuntu-latest
    if: needs.rollback_check.outputs.should_deploy == 'true'
    steps:

      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            sleep 5
            curl -sf http://localhost:8000/health && echo "Health check passed." || exit 1

      - name: Bonus 4: Upload new metrics to S3 for next comparison
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
        run: |
          python - <<'EOF'
          import os
          import boto3
          s3 = boto3.client('s3')
          bucket = os.environ["CLOUD_BUCKET"]
          s3.upload_file("outputs/metrics.json", bucket, "metrics/metrics.json")
          print("Metrics uploaded to S3 for future comparison.")
          EOF
